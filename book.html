<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>웹소설 리더 - 내 서재</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- PeerJS for P2P Sync -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <!-- QRCode generators and scanners -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <!-- JSZip & FileSaver for Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(156, 163, 175, 0.5); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(156, 163, 175, 0.8); }

        .font-sans-kr { font-family: 'Noto Sans KR', sans-serif; }
        .font-serif-kr { font-family: 'Noto Serif KR', serif; }

        .theme-white { --bg-color: #ffffff; --text-color: #111827; }
        .theme-sepia { --bg-color: #f6f1e3; --text-color: #5f4b32; } 
        .theme-dark { --bg-color: #374151; --text-color: #e5e7eb; }
        .theme-mint { --bg-color: #e0f2f1; --text-color: #004d40; }
        .theme-black { --bg-color: #000000; --text-color: #9ca3af; }

        #viewer-screen {
            background-color: var(--bg-color) !important;
            color: var(--text-color) !important;
            transition: background-color 0.3s, color 0.3s;
        }

        .viewer-content p {
            color: inherit !important; 
            margin-bottom: 1.2em;
            min-height: 1em;
            word-break: keep-all;
            text-align: justify;
        }
        
        .chapter-title {
            font-weight: 700;
            font-size: 1.2em;
            margin-top: 2em;
            margin-bottom: 1em;
            padding-bottom: 0.5em;
            border-bottom: 1px solid currentColor;
            opacity: 0.8;
        }
        
        .viewer-header-gradient {
            background: linear-gradient(to bottom, var(--bg-color), transparent);
        }

        .book-cover-1 { background: linear-gradient(135deg, #a8c0ff 0%, #3f2b96 100%); }
        .book-cover-2 { background: linear-gradient(135deg, #fccb90 0%, #d57eeb 100%); }
        .book-cover-3 { background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%); }
        .book-cover-4 { background: linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%); }
        .book-cover-5 { background: linear-gradient(135deg, #fa709a 0%, #fee140 100%); }

        .book-card { transition: transform 0.2s, box-shadow 0.2s; }
        .book-card:hover { transform: translateY(-4px); box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); }
        
        .folder-card { background: #fefce8; border: 1px solid #fde047; }
        .folder-card:hover { background: #fef9c3; }

        #settings-panel { transition: transform 0.3s ease-in-out; }
        .panel-hidden { transform: translateY(100%); }
        .panel-visible { transform: translateY(0); }
        
        #toc-sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .toc-hidden { transform: translateX(-100%); }
        .toc-visible { transform: translateX(0); }

        .loader {
            border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%;
            width: 40px; height: 40px; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .nav-btn {
            background-color: rgba(0,0,0,0.05); padding: 1rem; border-radius: 0.5rem; text-align: center; font-weight: bold; transition: background-color 0.2s; cursor: pointer;
        }
        .nav-btn:hover { background-color: rgba(0,0,0,0.1); }
    </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col font-sans-kr overflow-hidden text-gray-800 touch-pan-y">

    <!-- 1. 서재 화면 (Library) -->
    <div id="library-screen" class="flex-1 flex flex-col h-full bg-gray-50 text-gray-800 overflow-hidden">
        <header class="bg-white border-b border-gray-200 px-6 py-4 flex flex-col md:flex-row justify-between items-center shadow-sm z-10 gap-4">
            <div class="flex items-center justify-between w-full md:w-auto gap-4">
                <div class="flex items-center gap-2">
                    <button id="back-to-root-btn" onclick="goToRoot()" class="hidden mr-2 p-2 rounded-full hover:bg-gray-100 text-gray-600">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
                    </button>
                    <div>
                        <h1 id="library-title" class="text-2xl font-bold text-gray-800">내 서재</h1>
                        <p id="library-subtitle" class="text-xs text-gray-500 mt-1">저장된 소설 목록</p>
                    </div>
                    <div class="flex items-center gap-1 ml-2">
                        <button onclick="openSyncModal()" class="text-gray-400 hover:text-blue-600 transition-colors p-2 rounded-full hover:bg-gray-100" title="데이터 관리"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" /></svg></button>
                        <button onclick="openCreateCollectionModal()" class="text-gray-400 hover:text-yellow-500 transition-colors p-2 rounded-full hover:bg-gray-100" title="새 폴더 만들기"><svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 13h6m-3-3v6m-9 1V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z" /></svg></button>
                    </div>
                </div>
            </div>
            
            <div class="flex items-center gap-2 w-full md:w-auto justify-end">
                <div class="relative">
                    <button onclick="toggleDownloadMenu(event)" class="flex items-center gap-1 px-3 py-2 bg-gray-100 rounded-lg text-sm text-gray-600 hover:bg-gray-200 transition-colors" title="내보내기">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                    </button>
                    <div id="download-menu" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-xl border border-gray-100 z-30 py-1">
                        <button onclick="downloadAsZip()" class="block w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 flex items-center gap-2"><span class="text-blue-500">📦</span> 일괄 다운로드 (ZIP)</button>
                        <button onclick="downloadAsMerged()" class="block w-full text-left px-4 py-2 text-sm text-gray-700 hover:bg-gray-50 flex items-center gap-2"><span class="text-green-500">📑</span> 하나로 합치기 (TXT)</button>
                    </div>
                </div>
                <button onclick="cycleSort()" id="sort-btn" class="flex items-center gap-1 px-3 py-2 bg-gray-100 rounded-lg text-sm text-gray-600 hover:bg-gray-200 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4h13M3 8h9m-9 4h6m4 0l4-4m0 0l4 4m-4-4v12" /></svg>
                    <span id="sort-label">최신순</span>
                </button>
                <div class="h-6 w-px bg-gray-300 mx-1"></div>
                <button onclick="openUploadModal()" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-2 rounded-lg text-sm font-medium flex items-center gap-1 shadow-sm"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm3.293-7.707a1 1 0 011.414 0L9 10.586V3a1 1 0 112 0v7.586l1.293-1.293a1 1 0 111.414 1.414l-3 3a1 1 0 01-1.414 0l-3-3a1 1 0 010-1.414z" clip-rule="evenodd" /></svg><span class="hidden sm:inline">업로드</span></button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-6" id="library-container">
            <div id="book-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6 max-w-7xl mx-auto"></div>
            <div id="empty-state" class="hidden h-full flex flex-col items-center justify-center text-gray-400 space-y-4 pb-20">
                <div class="text-6xl">📂</div><p class="text-lg">서재가 비어있습니다.</p><p class="text-sm">우측 상단 버튼을 눌러 소설을 추가해보세요.</p>
            </div>
        </main>
    </div>

    <!-- 2. 뷰어 화면 (Viewer) -->
    <div id="viewer-screen" class="hidden fixed inset-0 z-50 flex flex-col theme-sepia">
        <div class="absolute top-0 left-0 w-full h-1 bg-current/10 z-50">
            <div id="progress-bar" class="h-full bg-blue-500 transition-all duration-150" style="width: 0%"></div>
        </div>

        <!-- 🌟 수정된 상단바 (설정, 상하 이동 화살표 포함) -->
        <header class="viewer-header-gradient absolute top-0 w-full p-2 sm:p-4 flex justify-between items-center z-40 h-16 sm:h-20 transition-opacity duration-300 opacity-0 hover:opacity-100 active:opacity-100 focus-within:opacity-100">
            <!-- 왼쪽: 나가기, 목차 -->
            <div class="flex items-center gap-1 shrink-0">
                <button onclick="goBack()" class="flex items-center gap-1 p-2 rounded-lg hover:bg-black/10 transition-colors text-sm font-medium opacity-70 hover:opacity-100 bg-white/20 backdrop-blur-sm" title="나가기">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" /></svg>
                    <span class="hidden sm:inline">나가기</span>
                </button>
                <button onclick="toggleTOC()" class="flex items-center gap-1 p-2 rounded-lg hover:bg-black/10 transition-colors text-sm font-medium opacity-70 hover:opacity-100 bg-white/20 backdrop-blur-sm" title="목차">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7" /></svg>
                    <span class="hidden sm:inline">목차</span>
                </button>
            </div>

            <!-- 중앙: 제목 -->
            <h2 id="viewer-title" class="text-base sm:text-lg font-bold flex-1 text-center px-2 truncate drop-shadow-md">제목</h2>
            
            <!-- 오른쪽: 위로, 아래로, 공유, 설정 -->
            <div class="flex items-center gap-1 shrink-0">
                <button onclick="scrollToTop()" class="p-2 rounded-lg hover:bg-black/10 transition-colors text-sm font-medium opacity-70 hover:opacity-100 bg-white/20 backdrop-blur-sm" title="맨 위로">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 15l7-7 7 7" /></svg>
                </button>
                <button onclick="scrollToBottom()" class="p-2 rounded-lg hover:bg-black/10 transition-colors text-sm font-medium opacity-70 hover:opacity-100 bg-white/20 backdrop-blur-sm" title="맨 아래로">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
                </button>
                <button onclick="shareNovel()" class="p-2 rounded-lg hover:bg-black/10 transition-colors text-sm font-medium opacity-70 hover:opacity-100 bg-white/20 backdrop-blur-sm hidden sm:flex" title="공유">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" /></svg>
                </button>
                <button onclick="toggleSettings()" class="p-2 rounded-lg hover:bg-black/10 transition-colors text-sm font-medium opacity-70 hover:opacity-100 bg-white/20 backdrop-blur-sm" title="설정">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /></svg>
                </button>
            </div>
        </header>

        <main id="content-container" class="h-full overflow-y-auto px-4 pb-32 pt-16 md:px-0 scroll-smooth">
            <div id="content-inner" class="viewer-content max-w-3xl mx-auto text-lg leading-relaxed outline-none min-h-screen" tabindex="0"></div>
            <div class="max-w-3xl mx-auto mt-16 mb-20 px-2">
                <div class="grid grid-cols-2 gap-4">
                    <button id="btn-prev-chap" class="nav-btn" onclick="moveToNeighbor(-1)">← 이전 소설</button>
                    <button id="btn-next-chap" class="nav-btn" onclick="moveToNeighbor(1)">다음 소설 →</button>
                </div>
            </div>
        </main>

        <!-- 목차 사이드바 -->
        <div id="toc-dim" onclick="toggleTOC()" class="fixed inset-0 bg-black/50 z-[60] hidden opacity-0 transition-opacity"></div>
        <aside id="toc-sidebar" class="fixed top-0 left-0 w-[80%] max-w-xs h-full bg-[var(--bg-color)] shadow-2xl z-[70] toc-hidden flex flex-col border-r border-current/10">
            <div class="p-4 border-b border-current/10 flex justify-between items-center bg-[var(--bg-color)]">
                <h3 class="font-bold text-lg opacity-80">목차</h3>
                <div class="flex items-center gap-2">
                    <button onclick="openAutoTOCModal()" class="p-2 bg-blue-50 text-blue-600 rounded-lg hover:bg-blue-100 transition-colors" title="목차 자동 분석 (전체 스캔)">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z" />
                        </svg>
                    </button>
                    <button onclick="toggleTOC()" class="opacity-50 hover:opacity-100 text-2xl">✕</button>
                </div>
            </div>
            
            <button onclick="addCurrentPositionToTOC()" class="m-2 p-3 bg-gray-100 text-gray-700 rounded-lg flex items-center justify-center gap-2 hover:bg-gray-200 transition-colors font-bold text-sm">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                </svg>
                현재 위치 추가
            </button>

            <div id="toc-list" class="flex-1 overflow-y-auto p-2 space-y-1"></div>
        </aside>

        <!-- 설정 패널 (버튼 및 화살표 제거됨) -->
        <div id="settings-panel" class="absolute bottom-0 left-0 w-full bg-[var(--bg-color)] border-t border-current/10 p-6 z-40 panel-hidden shadow-2xl rounded-t-2xl">
            <div class="max-w-3xl mx-auto space-y-6 relative">
                <div class="w-12 h-1 bg-current/20 rounded-full mx-auto mb-2 cursor-pointer" onclick="toggleSettings()"></div>
                <div class="space-y-2">
                    <label class="text-sm font-bold opacity-70">배경 테마</label>
                    <div class="flex space-x-3 overflow-x-auto pb-2 no-scrollbar">
                        <button onclick="setTheme('theme-white')" class="w-10 h-10 rounded-full border border-gray-300 shadow-sm bg-white flex-shrink-0 ring-offset-2 focus:ring-2 ring-blue-500"></button>
                        <button onclick="setTheme('theme-sepia')" class="w-10 h-10 rounded-full border border-gray-300 shadow-sm bg-[#f6f1e3] flex-shrink-0 ring-offset-2 focus:ring-2 ring-blue-500"></button>
                        <button onclick="setTheme('theme-mint')" class="w-10 h-10 rounded-full border border-gray-300 shadow-sm bg-[#e0f2f1] flex-shrink-0 ring-offset-2 focus:ring-2 ring-blue-500"></button>
                        <button onclick="setTheme('theme-dark')" class="w-10 h-10 rounded-full border border-gray-600 shadow-sm bg-[#374151] flex-shrink-0 ring-offset-2 focus:ring-2 ring-blue-500"></button>
                        <button onclick="setTheme('theme-black')" class="w-10 h-10 rounded-full border border-gray-700 shadow-sm bg-[#000000] flex-shrink-0 ring-offset-2 focus:ring-2 ring-blue-500"></button>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-sm font-bold opacity-70">글꼴</label>
                        <div class="flex bg-current/5 rounded-lg p-1">
                            <button onclick="setFont('sans')" id="btn-font-sans" class="flex-1 py-2 rounded-md text-sm font-sans-kr transition-colors">고딕</button>
                            <button onclick="setFont('serif')" id="btn-font-serif" class="flex-1 py-2 rounded-md text-sm font-serif-kr transition-colors">명조</button>
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-bold opacity-70">크기 및 간격</label>
                        <div class="flex items-center space-x-3">
                            <button onclick="adjustSize(-1)" class="w-8 h-8 rounded-full bg-current/10 flex items-center justify-center">-</button>
                            <span id="font-size-display" class="font-mono text-sm w-8 text-center"></span>
                            <button onclick="adjustSize(1)" class="w-8 h-8 rounded-full bg-current/10 flex items-center justify-center">+</button>
                            <div class="h-4 w-px bg-current/20 mx-1"></div>
                            <button onclick="adjustLineHeight(-0.1)" class="px-2 py-1 rounded bg-current/10 text-xs">좁게</button>
                            <button onclick="adjustLineHeight(0.1)" class="px-2 py-1 rounded bg-current/10 text-xs">넓게</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- P2P 모달 -->
    <div id="sync-modal" class="fixed inset-0 bg-black/50 z-[65] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-md p-6 shadow-2xl relative flex flex-col max-h-[90vh] overflow-y-auto">
            <button onclick="closeSyncModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 z-10">✕</button>
            <h3 class="text-xl font-bold mb-4 text-gray-800 flex items-center gap-2">데이터 관리 및 동기화</h3>
            <div id="sync-main-view" class="space-y-6">
                <div>
                    <h4 class="text-sm font-bold text-gray-500 mb-2 uppercase tracking-wider">📡 기기 간 직접 전송 (P2P)</h4>
                    <div class="space-y-3">
                        <button onclick="startHostMode()" class="w-full bg-blue-50 hover:bg-blue-100 border border-blue-200 text-blue-700 p-4 rounded-xl flex items-center justify-between group transition-colors">
                            <div class="text-left"><div class="font-bold">📤 내 서재 데이터 보내기</div><div class="text-xs opacity-70">일회용 코드/QR로 전송</div></div>
                        </button>
                        <button onclick="startClientMode()" class="w-full bg-green-50 hover:bg-green-100 border border-green-200 text-green-700 p-4 rounded-xl flex items-center justify-between group transition-colors">
                            <div class="text-left"><div class="font-bold">📥 다른 기기 데이터 받기</div><div class="text-xs opacity-70">코드 입력/QR 스캔</div></div>
                        </button>
                    </div>
                </div>
                <hr class="border-gray-200">
                <div>
                    <h4 class="text-sm font-bold text-gray-500 mb-2 uppercase tracking-wider">💾 파일 백업 및 복원</h4>
                    <div class="space-y-3">
                        <button onclick="exportAllData()" class="w-full bg-gray-50 hover:bg-gray-100 border border-gray-200 text-gray-700 p-3 rounded-lg flex items-center justify-center gap-2 font-medium text-sm">
                            전체 데이터 내보내기 (.json)
                        </button>
                        <div class="relative">
                            <input type="file" id="backup-input" accept=".json" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" onchange="importFromFile(this)">
                            <button class="w-full bg-gray-50 hover:bg-gray-100 border border-gray-200 text-gray-700 p-3 rounded-lg flex items-center justify-center gap-2 font-medium text-sm pointer-events-none">
                                데이터 불러오기 (.json)
                            </button>
                        </div>
                    </div>
                </div>
            </div>
            
            <div id="sync-host-view" class="hidden flex flex-col items-center text-center space-y-4">
                <p class="text-sm text-gray-600">받는 기기에 아래 코드를 입력하거나 QR을 스캔하세요.</p>
                <div class="bg-gray-50 border-2 border-dashed border-blue-300 rounded-xl p-4 w-full">
                    <p class="text-xs text-gray-500 mb-1">일회용 연결 코드</p>
                    <div id="host-code-display" class="text-4xl font-mono font-bold tracking-widest text-blue-600 select-all">-----</div>
                </div>
                <div id="qrcode-container" class="bg-white p-2 rounded-lg border shadow-sm flex justify-center"></div>
                <button onclick="resetSyncView()" class="text-gray-500 text-sm hover:underline mt-2">뒤로 가기</button>
            </div>
            
            <div id="sync-client-view" class="hidden flex flex-col space-y-4">
                <div id="manual-input-container" class="space-y-4">
                    <input type="number" id="target-peer-id" placeholder="5자리 숫자 코드 입력" class="w-full text-center text-2xl font-mono border-2 border-gray-300 rounded-xl p-3 outline-none focus:border-blue-500 transition-colors" maxlength="5">
                    <button onclick="connectToPeer()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold shadow-md hover:bg-blue-700 transition-transform active:scale-95">연결하고 데이터 받기</button>
                    <button onclick="startScanner()" class="w-full bg-gray-100 text-gray-700 py-3 rounded-lg font-bold hover:bg-gray-200 flex items-center justify-center gap-2">카메라로 QR 스캔하기</button>
                </div>
                <div id="qr-reader-container" class="hidden flex flex-col items-center">
                    <div id="reader" class="bg-black w-full overflow-hidden rounded-lg"></div>
                    <button onclick="stopScanner()" class="w-full mt-2 py-2 bg-gray-200 rounded text-sm font-medium">카메라 끄기</button>
                </div>
                <button onclick="resetSyncView()" class="text-gray-500 text-sm hover:underline text-center mt-2">뒤로 가기</button>
            </div>
            
            <div id="sync-status" class="mt-4 text-center hidden">
                <div class="inline-flex items-center gap-2 px-4 py-2 bg-blue-50 text-blue-700 rounded-full text-sm font-bold animate-pulse">
                    <span id="sync-status-text">상태 메시지</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 파일 업로드 / 폴더 생성 모달 -->
    <div id="upload-modal" class="fixed inset-0 bg-black/50 z-[60] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-md p-6 shadow-2xl relative">
            <button onclick="closeUploadModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600">✕</button>
            <h3 class="text-xl font-bold mb-4 text-gray-800">새 소설 추가</h3>
            <div class="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center hover:bg-gray-50 transition-colors cursor-pointer relative"><input type="file" id="file-input" accept=".txt" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer"><div class="text-4xl mb-2">📂</div><p class="text-gray-600 font-medium">TXT 파일을 선택하세요</p><p id="selected-filename" class="text-blue-600 text-sm mt-2 hidden"></p></div>
            <div class="mt-4 flex items-center gap-2 text-sm text-gray-600 justify-center"><label>인코딩:</label><select id="encoding-select" class="border rounded px-2 py-1"><option value="utf-8">UTF-8 (기본)</option><option value="euc-kr">EUC-KR (깨짐 방지)</option></select></div>
            <div class="mt-6 flex justify-end gap-3"><button onclick="closeUploadModal()" class="px-4 py-2 text-gray-500 hover:bg-gray-100 rounded-lg">취소</button><button onclick="processUpload()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 shadow-sm">추가하기</button></div>
        </div>
    </div>
    <div id="create-collection-modal" class="fixed inset-0 bg-black/50 z-[60] hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-sm p-6 shadow-2xl relative"><h3 class="text-lg font-bold mb-4">새 폴더</h3><input type="text" id="new-collection-name" placeholder="이름" class="w-full border-2 border-gray-200 rounded-xl p-3 outline-none focus:border-yellow-400 mb-4"><div class="flex justify-end gap-2"><button onclick="closeCreateCollectionModal()" class="px-4 py-2 text-gray-500 hover:bg-gray-100 rounded-lg">취소</button><button onclick="createCollection()" class="px-4 py-2 bg-yellow-500 text-white rounded-lg">만들기</button></div></div>
    </div>
    <div id="loader-overlay" class="fixed inset-0 bg-black/50 z-[70] hidden flex items-center justify-center">
        <div class="bg-white p-6 rounded-lg shadow-xl flex flex-col items-center space-y-4"><div class="loader"></div><p id="loader-text" class="text-gray-800 font-medium">처리 중...</p></div>
    </div>

    <script>
        // --- 1. 전역 변수 및 초기화 ---
        const DB_NAME = 'WebNovelLibrary';
        const DB_VERSION = 3;
        const PEER_PREFIX = 'wnr-sync-'; // PeerJS용 접두사
        let db;
        let currentBookId = null;
        let currentBookData = null;
        let currentCollectionId = null;
        let currentSort = { field: 'lastRead', order: 'desc' };
        let settings = { theme: 'theme-sepia', fontSize: 20, lineHeight: 1.8, fontFamily: 'sans' };
        
        let peer = null; 
        let conn = null; 
        let html5QrCode = null;
        let bookTOC = []; 

        async function init() {
            loadSettings();
            await initDB();
            window.addEventListener('hashchange', handleHashChange);
            handleHashChange();
            
            document.getElementById('file-input').addEventListener('change', function() {
                if(this.files[0]) { 
                    document.getElementById('selected-filename').textContent = this.files[0].name; 
                    document.getElementById('selected-filename').classList.remove('hidden'); 
                }
            });
            
            document.getElementById('content-container').addEventListener('scroll', throttle(() => { 
                updateProgress(); 
                if(currentBookId) saveScrollPosition(); 
            }, 1000));
            
            // 전역 클릭 감지로 다운로드 메뉴 닫기
            document.addEventListener('click', (e) => {
                const menu = document.getElementById('download-menu');
                const btn = document.querySelector('button[title="내보내기"]');
                if (menu && !menu.classList.contains('hidden') && !menu.contains(e.target) && btn && !btn.contains(e.target)) {
                    menu.classList.add('hidden');
                }
            });
        }

        // --- 2. IndexedDB 코어 함수 ---
        function initDB() {
            return new Promise((r,j)=>{
                const q=indexedDB.open(DB_NAME,DB_VERSION);
                q.onerror=()=>j("Err");
                q.onupgradeneeded=e=>{
                    const d=e.target.result;
                    if(!d.objectStoreNames.contains('books')){
                        const s=d.createObjectStore('books',{keyPath:'id',autoIncrement:true});
                        s.createIndex('lastRead','lastRead');
                        s.createIndex('title','title');
                    }
                    if(!d.objectStoreNames.contains('collections')){
                        const s=d.createObjectStore('collections',{keyPath:'id',autoIncrement:true});
                        s.createIndex('name','name');
                    }
                };
                q.onsuccess=e=>{db=e.target.result;r(db)}
            });
        }
        function getAllCollections(){return new Promise(r=>{db.transaction(['collections'],'readonly').objectStore('collections').getAll().onsuccess=e=>r(e.target.result)})}
        function addCollection(n){return new Promise(r=>{db.transaction(['collections'],'readwrite').objectStore('collections').add({name:n,created:new Date()}).onsuccess=()=>r()})}
        function saveBookToDB(t,c,cid=null){return new Promise(r=>{db.transaction(['books'],'readwrite').objectStore('books').add({title:t.replace('.txt',''),content:c,progress:0,lastRead:new Date(),coverId:Math.floor(Math.random()*5)+1,collectionId:cid}).onsuccess=e=>r(e.target.result)})}
        function getAllBooks(){return new Promise(r=>{db.transaction(['books'],'readonly').objectStore('books').getAll().onsuccess=e=>r(e.target.result)})}
        function getBook(id){return new Promise(r=>{db.transaction(['books'],'readonly').objectStore('books').get(id).onsuccess=e=>r(e.target.result)})}
        function deleteBook(id){return new Promise(r=>{db.transaction(['books'],'readwrite').objectStore('books').delete(id).onsuccess=()=>r()})}
        function updateBookProgress(id,st,p){
            return new Promise(r=>{
                const s=db.transaction(['books'],'readwrite').objectStore('books');
                s.get(id).onsuccess=e=>{
                    const d=e.target.result;
                    if(d){ d.scrollTop=st; d.progress=p; d.lastRead=new Date(); s.put(d); }
                    r();
                }
            });
        }
        function saveBookTOC(id, toc){
            return new Promise(r=>{
                const s=db.transaction(['books'],'readwrite').objectStore('books');
                s.get(id).onsuccess=e=>{
                    const d=e.target.result;
                    if(d){ d.toc=toc; s.put(d); }
                    r();
                }
            })
        }

        // --- 3. 서재(Library) UI 로직 ---
        function handleHashChange() {
            const hash = window.location.hash;
            if (hash.startsWith('#/folder/')) { 
                const id = parseInt(hash.replace('#/folder/', '')); 
                renderLibrary(id); 
                document.getElementById('library-screen').classList.remove('hidden'); 
                document.getElementById('viewer-screen').classList.add('hidden'); 
            } 
            else if (hash.startsWith('#/read/')) { 
                const id = parseInt(hash.replace('#/read/', '')); 
                openBook(id); 
            } 
            else { 
                renderLibrary(null); 
                document.getElementById('library-screen').classList.remove('hidden'); 
                document.getElementById('viewer-screen').classList.add('hidden'); 
            }
        }
        function goToRoot() { window.location.hash = '#/'; }
        function goToFolder(id) { window.location.hash = `#/folder/${id}`; }
        function goToReader(id) { window.location.hash = `#/read/${id}`; }
        function goBack() { if(currentCollectionId) goToFolder(currentCollectionId); else goToRoot(); }

        async function renderLibrary(cid = null) {
            currentCollectionId = cid; 
            const books = await getSortedBooks(cid); 
            const cols = await getAllCollections();
            const grid = document.getElementById('book-grid'); 
            const empty = document.getElementById('empty-state'); 
            const back = document.getElementById('back-to-root-btn'); 
            const title = document.getElementById('library-title');
            
            grid.innerHTML = '';
            if (cid !== null) { 
                const col = cols.find(c => c.id === cid); 
                title.textContent = col ? col.name : '폴더'; 
                back.classList.remove('hidden'); 
            } else { 
                title.textContent = '내 서재'; 
                back.classList.add('hidden'); 
                cols.forEach(col => { 
                    const el = document.createElement('div'); 
                    el.className = 'folder-card rounded-xl shadow-sm p-4 flex flex-col items-center justify-center cursor-pointer transition-transform hover:-translate-y-1 h-40'; 
                    el.onclick = () => goToFolder(col.id); 
                    el.innerHTML = `<div class="text-5xl mb-2">📁</div><div class="font-bold text-gray-700 truncate w-full text-center px-2">${col.name}</div>`; 
                    grid.appendChild(el); 
                });
            }

            books.forEach(b => {
                const p = b.progress ? Math.round(b.progress) : 0;
                const el = document.createElement('div'); el.className = 'book-card bg-white rounded-xl shadow-md overflow-hidden flex flex-col cursor-pointer group relative';
                el.innerHTML = `<div class="h-32 book-cover-${b.coverId || 1} p-4 flex items-end relative" onclick="goToReader(${b.id})"><span class="text-white font-bold truncate w-full text-lg drop-shadow-md">${b.title}</span><div class="absolute top-2 right-2 bg-black/20 text-white text-xs px-2 py-1 rounded-full backdrop-blur-sm">${p}%</div></div><div class="p-3 flex justify-between items-center bg-white"><div class="text-xs text-gray-400">최근: ${new Date(b.lastRead).toLocaleDateString()}</div><button onclick="confirmDelete(event, ${b.id})" class="p-1 text-red-400 hover:text-red-600">🗑️</button></div>`;
                grid.appendChild(el);
            });

            if (grid.children.length === 0) { empty.classList.remove('hidden'); grid.classList.add('hidden'); } else { empty.classList.add('hidden'); grid.classList.remove('hidden'); }
        }

        async function getSortedBooks(cid) {
            const books = await getAllBooks();
            const filtered = books.filter(b => cid === null ? !b.collectionId : b.collectionId === cid);
            filtered.sort((a, b) => {
                if (currentSort.field === 'title') {
                    return currentSort.order === 'asc' ? a.title.localeCompare(b.title) : b.title.localeCompare(a.title);
                }
                return currentSort.order === 'asc' ? a.lastRead - b.lastRead : b.lastRead - a.lastRead;
            });
            return filtered;
        }

        function cycleSort() {
            if (currentSort.field === 'lastRead') { currentSort = { field: 'title', order: 'asc' }; document.getElementById('sort-label').textContent = '가나다순'; } 
            else { currentSort = { field: 'lastRead', order: 'desc' }; document.getElementById('sort-label').textContent = '최신순'; }
            renderLibrary(currentCollectionId);
        }

        async function confirmDelete(e,id){e.stopPropagation();if(confirm('삭제하시겠습니까?')){await deleteBook(id);renderLibrary(currentCollectionId)}}

        // --- 4. 뷰어(Viewer) 및 설정 로직 ---
        async function openBook(id) {
            showLoader('로딩 중...');
            const book = await getBook(id);
            if(!book) { hideLoader(); goToRoot(); return; }
            currentBookId = id; currentBookData = book;
            document.getElementById('viewer-title').textContent = book.title;

            // 목차 복원
            bookTOC = book.toc || [];

            const frag = document.createDocumentFragment();
            book.content.split(/\r?\n/).forEach((line, idx) => {
                const p = document.createElement('p');
                p.textContent = line.trim() || '\u00A0';
                p.dataset.lineIndex = idx;
                p.id = `line-${idx}`;
                frag.appendChild(p);
            });
            const cin = document.getElementById('content-inner'); cin.innerHTML=''; cin.appendChild(frag);
            
            document.getElementById('library-screen').classList.add('hidden');
            document.getElementById('viewer-screen').classList.remove('hidden');
            applySettings();
            
            if(book.scrollTop) setTimeout(()=> document.getElementById('content-container').scrollTop = book.scrollTop, 50);
            hideLoader();
        }

        async function moveToNeighbor(offset) {
            const books = await getSortedBooks(currentCollectionId);
            const index = books.findIndex(b => b.id === currentBookId);
            if (index !== -1 && books[index + offset]) {
                goToReader(books[index + offset].id);
            } else {
                alert(offset > 0 ? '마지막 소설입니다.' : '첫 번째 소설입니다.');
            }
        }

        function toggleSettings() {
            const p = document.getElementById('settings-panel');
            const h = p.classList.contains('panel-hidden');
            if (h) {
                p.classList.remove('panel-hidden'); p.classList.add('panel-visible');
            } else {
                p.classList.add('panel-hidden'); p.classList.remove('panel-visible');
            }
        }

        function scrollToTop() { document.getElementById('content-container').scrollTo({ top: 0, behavior: 'smooth' }); }
        function scrollToBottom() { const c = document.getElementById('content-container'); c.scrollTo({ top: c.scrollHeight, behavior: 'smooth' }); }

        function setTheme(t){const v=document.getElementById('viewer-screen');v.className=v.className.replace(/theme-\w+/,'').trim()+' '+t;settings.theme=t;saveSettings()}
        function setFont(t){settings.fontFamily=t;const ci=document.getElementById('content-inner');if(t==='sans'){ci.classList.remove('font-serif-kr');ci.classList.add('font-sans-kr')}else{ci.classList.remove('font-sans-kr');ci.classList.add('font-serif-kr')}saveSettings()}
        function adjustSize(d){settings.fontSize=Math.max(12,Math.min(40,settings.fontSize+d));applyStyleUpdates();saveSettings()}
        function adjustLineHeight(d){settings.lineHeight=Math.round((Math.max(1.2,Math.min(3.0,settings.lineHeight+d)))*10)/10;applyStyleUpdates();saveSettings()}
        function applyStyleUpdates(){
            const ci = document.getElementById('content-inner');
            ci.style.fontSize = `${settings.fontSize}px`;
            ci.style.lineHeight = settings.lineHeight;
            document.getElementById('font-size-display').textContent = settings.fontSize;
        }
        function applySettings(){setTheme(settings.theme);setFont(settings.fontFamily);applyStyleUpdates()}
        function saveSettings(){localStorage.setItem('webNovelReaderSettings',JSON.stringify(settings))}
        function loadSettings(){const s=localStorage.getItem('webNovelReaderSettings');if(s)settings={...settings,...JSON.parse(s)}}
        function updateProgress(){const c=document.getElementById('content-container');const p=(c.scrollTop/(c.scrollHeight-c.clientHeight))*100||0;document.getElementById('progress-bar').style.width=`${p}%`;return{scrollTop:c.scrollTop,percent:p}}
        function saveScrollPosition(){if(currentBookId){const{scrollTop,percent}=updateProgress();updateBookProgress(currentBookId,scrollTop,percent)}}

        // --- 5. 목차 (TOC) 로직 ---
        function toggleTOC() {
            const s = document.getElementById('toc-sidebar');
            const d = document.getElementById('toc-dim');
            if(s.classList.contains('toc-hidden')){
                s.classList.remove('toc-hidden'); s.classList.add('toc-visible');
                d.classList.remove('hidden'); setTimeout(()=>d.classList.add('opacity-100'),10);
                renderTOC();
            } else {
                s.classList.add('toc-hidden'); s.classList.remove('toc-visible');
                d.classList.remove('opacity-100'); setTimeout(()=>d.classList.add('hidden'),300);
            }
        }

        function renderTOC() {
            const list = document.getElementById('toc-list');
            list.innerHTML = '';
            if(bookTOC.length === 0) {
                list.innerHTML = '<div class="text-sm text-gray-500 p-4 text-center">저장된 목차가 없습니다.<br>자동 분석을 실행해보세요.</div>';
                return;
            }
            bookTOC.forEach((item, index) => {
                const btn = document.createElement('button');
                btn.className = 'w-full text-left p-3 hover:bg-black/5 rounded text-sm truncate flex justify-between items-center group';
                btn.innerHTML = `<span>${item.title}</span> <span class="text-xs text-red-400 opacity-0 group-hover:opacity-100 px-2" onclick="deleteTOCItem(event, ${index})">✕</span>`;
                btn.onclick = (e) => {
                    if(e.target.tagName !== 'SPAN' || !e.target.classList.contains('text-red-400')) {
                        const el = document.getElementById(`line-${item.lineIndex}`);
                        if(el) { el.scrollIntoView({behavior: 'smooth', block: 'start'}); toggleTOC(); }
                    }
                };
                list.appendChild(btn);
            });
        }

        async function openAutoTOCModal() {
            showLoader('목차 분석 중...');
            const paragraphs = document.querySelectorAll('.viewer-content p');
            const regex = /^(제\s*\d+\s*[장편화]|chapter\s*\d+)/i;
            const newTOC = [];
            
            paragraphs.forEach(p => {
                const text = p.textContent.trim();
                if(text.length > 2 && text.length < 30 && regex.test(text)) {
                    newTOC.push({ title: text, lineIndex: parseInt(p.dataset.lineIndex) });
                    p.classList.add('chapter-title');
                }
            });

            if(newTOC.length > 0) {
                bookTOC = newTOC;
                await saveBookTOC(currentBookId, bookTOC);
                renderTOC();
            } else {
                alert('자동으로 식별할 수 있는 목차(제 N 화 등)가 없습니다.');
            }
            hideLoader();
        }

        async function addCurrentPositionToTOC() {
            const c = document.getElementById('content-container');
            const elements = document.elementsFromPoint(window.innerWidth / 2, 100);
            const p = elements.find(el => el.tagName === 'P' && el.parentElement.id === 'content-inner');
            
            if (p) {
                const title = prompt("현재 위치의 목차 이름을 입력하세요:", p.textContent.substring(0, 15) + "...");
                if (title) {
                    bookTOC.push({ title: title, lineIndex: parseInt(p.dataset.lineIndex) });
                    bookTOC.sort((a,b) => a.lineIndex - b.lineIndex);
                    await saveBookTOC(currentBookId, bookTOC);
                    renderTOC();
                }
            }
        }
        
        async function deleteTOCItem(e, index) {
            e.stopPropagation();
            bookTOC.splice(index, 1);
            await saveBookTOC(currentBookId, bookTOC);
            renderTOC();
        }

        // --- 6. P2P 동기화 및 백업 (PeerJS) ---
        function openSyncModal() {
            document.getElementById('sync-modal').classList.remove('hidden');
            resetSyncView();
        }
        function closeSyncModal() {
            document.getElementById('sync-modal').classList.add('hidden');
            if (peer) { peer.destroy(); peer = null; }
            stopScanner();
        }
        function resetSyncView() {
            document.getElementById('sync-main-view').classList.remove('hidden');
            document.getElementById('sync-host-view').classList.add('hidden');
            document.getElementById('sync-client-view').classList.add('hidden');
            document.getElementById('sync-status').classList.add('hidden');
            stopScanner();
            if (peer) { peer.destroy(); peer = null; }
        }
        function showSyncStatus(msg, isError = false) {
            const el = document.getElementById('sync-status');
            const txt = document.getElementById('sync-status-text');
            el.classList.remove('hidden');
            txt.textContent = msg;
            txt.parentElement.className = `inline-flex items-center gap-2 px-4 py-2 rounded-full text-sm font-bold animate-pulse ${isError ? 'bg-red-50 text-red-700' : 'bg-blue-50 text-blue-700'}`;
        }

        // HOST 모드 (보내기)
        async function startHostMode() {
            document.getElementById('sync-main-view').classList.add('hidden');
            document.getElementById('sync-host-view').classList.remove('hidden');
            
            const randomCode = Math.floor(10000 + Math.random() * 90000).toString(); // 5자리 숫자
            document.getElementById('host-code-display').textContent = randomCode;
            
            // QR 생성
            document.getElementById('qrcode-container').innerHTML = '';
            new QRCode(document.getElementById('qrcode-container'), {
                text: randomCode, width: 150, height: 150, colorDark: "#000", colorLight: "#fff"
            });

            showSyncStatus("상대방의 연결을 기다리는 중...");
            
            peer = new Peer(PEER_PREFIX + randomCode);
            peer.on('connection', (connection) => {
                conn = connection;
                showSyncStatus("기기 연결됨! 데이터 전송 중...");
                conn.on('data', async (data) => {
                    if (data === 'REQ_DATA') {
                        // DB 데이터 추출 및 전송
                        const books = await getAllBooks();
                        const collections = await getAllCollections();
                        conn.send({ type: 'SYNC_DATA', payload: { books, collections } });
                        showSyncStatus("전송 완료! 안전하게 닫으셔도 됩니다.");
                    }
                });
            });
            peer.on('error', (err) => showSyncStatus("오류 발생: " + err.type, true));
        }

        // CLIENT 모드 (받기)
        function startClientMode() {
            document.getElementById('sync-main-view').classList.add('hidden');
            document.getElementById('sync-client-view').classList.remove('hidden');
        }

        function connectToPeer(code = null) {
            const targetCode = code || document.getElementById('target-peer-id').value.trim();
            if (!targetCode || targetCode.length !== 5) { alert("5자리 코드를 입력해주세요."); return; }
            
            showSyncStatus("연결 시도 중...");
            peer = new Peer(); // 클라이언트는 랜덤 ID
            
            peer.on('open', () => {
                conn = peer.connect(PEER_PREFIX + targetCode);
                conn.on('open', () => {
                    showSyncStatus("연결 성공! 데이터 요청 중...");
                    conn.send('REQ_DATA');
                });
                
                conn.on('data', async (data) => {
                    if (data.type === 'SYNC_DATA') {
                        showSyncStatus("데이터 수신 완료. 저장 중...");
                        await processImportedData(data.payload);
                        showSyncStatus("동기화 완료!");
                        setTimeout(() => { closeSyncModal(); renderLibrary(null); }, 1500);
                    }
                });
                conn.on('error', () => showSyncStatus("전송 오류 발생", true));
            });
            peer.on('error', (err) => showSyncStatus("연결할 수 없습니다. 코드를 확인하세요.", true));
        }

        // QR 스캐너 (Client)
        function startScanner() {
            document.getElementById('manual-input-container').classList.add('hidden');
            document.getElementById('qr-reader-container').classList.remove('hidden');
            
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: { width: 250, height: 250 } },
                (decodedText) => {
                    if (decodedText && decodedText.length === 5 && !isNaN(decodedText)) {
                        stopScanner();
                        document.getElementById('target-peer-id').value = decodedText;
                        connectToPeer(decodedText);
                    }
                },
                (err) => {}
            ).catch(err => {
                alert("카메라 권한이 필요합니다.");
                stopScanner();
            });
        }
        function stopScanner() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    html5QrCode.clear();
                    html5QrCode = null;
                }).catch(e => console.log(e));
            }
            document.getElementById('manual-input-container').classList.remove('hidden');
            document.getElementById('qr-reader-container').classList.add('hidden');
        }

        // 백업/복원
        async function exportAllData() {
            const books = await getAllBooks();
            const collections = await getAllCollections();
            const data = JSON.stringify({ books, collections });
            const blob = new Blob([data], { type: 'application/json' });
            saveAs(blob, `WebNovelBackup_${new Date().toISOString().slice(0,10)}.json`);
        }

        function importFromFile(input) {
            const file = input.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    showLoader('데이터 복원 중...');
                    const data = JSON.parse(e.target.result);
                    await processImportedData(data);
                    renderLibrary(null);
                    hideLoader();
                    alert('복원 완료!');
                    closeSyncModal();
                } catch(err) {
                    hideLoader(); alert('잘못된 백업 파일입니다.');
                }
            };
            reader.readAsText(file);
        }

        async function processImportedData(data) {
            if(data.collections) {
                for(let c of data.collections) {
                    const exists = await new Promise(r=>db.transaction(['collections'],'readonly').objectStore('collections').get(c.id).onsuccess=e=>r(e.target.result));
                    if(!exists) await new Promise(r=>db.transaction(['collections'],'readwrite').objectStore('collections').put(c).onsuccess=()=>r());
                }
            }
            if(data.books) {
                for(let b of data.books) {
                    const exists = await new Promise(r=>db.transaction(['books'],'readonly').objectStore('books').get(b.id).onsuccess=e=>r(e.target.result));
                    if(!exists) await new Promise(r=>db.transaction(['books'],'readwrite').objectStore('books').put(b).onsuccess=()=>r());
                }
            }
        }

        // --- 7. 내보내기 및 공유 (ZIP, TXT, Share) ---
        function toggleDownloadMenu(e) {
            e.stopPropagation();
            document.getElementById('download-menu').classList.toggle('hidden');
        }

        async function downloadAsZip() {
            document.getElementById('download-menu').classList.add('hidden');
            showLoader('압축 중...');
            const books = await getSortedBooks(currentCollectionId);
            if(books.length === 0) { hideLoader(); alert('내보낼 소설이 없습니다.'); return; }
            
            const zip = new JSZip();
            books.forEach(b => zip.file(`${b.title}.txt`, b.content));
            
            const blob = await zip.generateAsync({type:"blob"});
            saveAs(blob, `MyWebNovels_${new Date().toISOString().slice(0,10)}.zip`);
            hideLoader();
        }

        async function downloadAsMerged() {
            document.getElementById('download-menu').classList.add('hidden');
            showLoader('병합 중...');
            const books = await getSortedBooks(currentCollectionId);
            if(books.length === 0) { hideLoader(); alert('내보낼 소설이 없습니다.'); return; }
            
            let mergedContent = "";
            books.forEach(b => {
                mergedContent += `\n\n========== ${b.title} ==========\n\n`;
                mergedContent += b.content;
            });
            
            const blob = new Blob([mergedContent], { type: 'text/plain;charset=utf-8' });
            saveAs(blob, `Merged_WebNovels_${new Date().toISOString().slice(0,10)}.txt`);
            hideLoader();
        }

        function shareNovel() {
            if(!currentBookData) return;
            if (navigator.share) {
                const file = new File([currentBookData.content], `${currentBookData.title}.txt`, { type: "text/plain" });
                navigator.share({
                    title: currentBookData.title,
                    text: '웹소설 리더에서 공유된 소설입니다.',
                    files: [file]
                }).catch(console.error);
            } else {
                alert('이 브라우저는 공유 기능을 지원하지 않습니다. 텍스트로 다운로드합니다.');
                const blob = new Blob([currentBookData.content], { type: 'text/plain;charset=utf-8' });
                saveAs(blob, `${currentBookData.title}.txt`);
            }
        }

        // --- 8. 기타 UI 컨트롤 (업로드 등) ---
        function showLoader(m){document.getElementById('loader-text').textContent=m;document.getElementById('loader-overlay').classList.remove('hidden')}
        function hideLoader(){document.getElementById('loader-overlay').classList.add('hidden')}
        function throttle(f,l){let t;return function(){if(!t){f.apply(this,arguments);t=true;setTimeout(()=>t=false,l)}}}
        
        function openUploadModal(){document.getElementById('upload-modal').classList.remove('hidden'); document.getElementById('selected-filename').classList.add('hidden'); document.getElementById('file-input').value=''; }
        function closeUploadModal(){document.getElementById('upload-modal').classList.add('hidden')}
        
        async function processUpload(){
            const f=document.getElementById('file-input').files[0];
            if(!f) return;
            closeUploadModal();
            showLoader('저장 중...');
            const enc=document.getElementById('encoding-select').value;
            const r=new FileReader();
            r.onload=async(e)=>{
                await saveBookToDB(f.name, e.target.result, currentCollectionId);
                renderLibrary(currentCollectionId);
                hideLoader();
            };
            r.readAsText(f, enc);
        }

        function openCreateCollectionModal(){document.getElementById('create-collection-modal').classList.remove('hidden'); document.getElementById('new-collection-name').value=''; }
        function closeCreateCollectionModal(){document.getElementById('create-collection-modal').classList.add('hidden')}
        async function createCollection(){
            const n=document.getElementById('new-collection-name').value.trim();
            if(!n) return;
            await addCollection(n);
            closeCreateCollectionModal();
            renderLibrary(currentCollectionId);
        }

        // 실행
        init();
    </script>
</body>
</html>
